<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
    </style>

    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neonstrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="softblur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <mask id="textmask">
      <text x="450" y="120" text-anchor="middle" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="8">NEHIR KÖKTEN</text>
    </mask>

    <linearGradient id="scanlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="45%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF2222" stop-opacity="1"/>
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="scanlightwhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="48%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="52%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>

    <!-- Yumuşak renk geçişi için gradient -->
    <linearGradient id="wavegrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3D0000"/>
      <stop offset="30%" stop-color="#8B0000"/>
      <stop offset="60%" stop-color="#CC1F1F"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>

    <linearGradient id="wavegrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="40%" stop-color="#CC1F1F"/>
      <stop offset="70%" stop-color="#E83030"/>
      <stop offset="100%" stop-color="#CC1F1F"/>
    </linearGradient>

    <linearGradient id="wavegrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CC1F1F"/>
      <stop offset="50%" stop-color="#FF2222"/>
      <stop offset="100%" stop-color="#CC1F1F"/>
    </linearGradient>
  </defs>

  <!-- Siyah arka plan -->
  <rect width="900" height="300" fill="#000000"/>

  <!-- Büyük yumuşak glow tabakası -->
  <ellipse cx="450" cy="320" rx="600" ry="160" fill="#8B0000" opacity="0.2" filter="url(#blur1)">
    <animate attributeName="ry" values="160;190;160" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Dalga 1 - en altta, en koyu, en yavaş -->
  <path d="M0,300 C225,265 450,280 675,260 C787,250 900,255 900,255 L900,300 Z" fill="url(#wavegrad1)" opacity="1">
    <animate attributeName="d"
      values="
        M0,300 C225,265 450,280 675,260 C787,250 900,255 900,255 L900,300 Z;
        M0,300 C225,245 450,265 675,248 C787,240 900,244 900,244 L900,300 Z;
        M0,300 C225,265 450,280 675,260 C787,250 900,255 900,255 L900,300 Z"
      dur="9s"
      calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      repeatCount="indefinite"/>
  </path>

  <!-- Dalga 2 - orta -->
  <path d="M0,300 C180,250 360,268 540,248 C720,228 810,238 900,234 L900,300 Z" fill="url(#wavegrad2)" opacity="0.9">
    <animate attributeName="d"
      values="
        M0,300 C180,250 360,268 540,248 C720,228 810,238 900,234 L900,300 Z;
        M0,300 C180,225 360,245 540,222 C720,200 810,212 900,208 L900,300 Z;
        M0,300 C180,250 360,268 540,248 C720,228 810,238 900,234 L900,300 Z"
      dur="7s"
      calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      repeatCount="indefinite"/>
  </path>

  <!-- Dalga 3 - en üstte, en parlak -->
  <path d="M0,300 C150,232 300,252 450,232 C600,212 750,225 900,218 L900,300 Z" fill="url(#wavegrad3)" opacity="0.75">
    <animate attributeName="d"
      values="
        M0,300 C150,232 300,252 450,232 C600,212 750,225 900,218 L900,300 Z;
        M0,300 C150,205 300,228 450,205 C600,182 750,198 900,190 L900,300 Z;
        M0,300 C150,232 300,252 450,232 C600,212 750,225 900,218 L900,300 Z"
      dur="5.5s"
      calcMode="spline"
      keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
      repeatCount="indefinite"/>
  </path>

  <!-- Yumuşak glow üst katman -->
  <ellipse cx="450" cy="280" rx="420" ry="60" fill="#FF2222" opacity="0.08" filter="url(#softblur)">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="60;80;60" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Yazı glow - kırmızı -->
  <text x="450" y="120" text-anchor="middle" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="64" font-weight="900" fill="#CC1F1F" letter-spacing="8" filter="url(#neonstrong)" opacity="0.7">
    NEHIR KÖKTEN
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Yazı ana - beyaz -->
  <text x="450" y="120" text-anchor="middle" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="8" filter="url(#neon)">
    NEHIR KÖKTEN
  </text>

  <!-- Işık tarama kırmızı -->
  <rect x="-900" y="55" width="1800" height="80" fill="url(#scanlight)" mask="url(#textmask)" filter="url(#neon)">
    <animateTransform attributeName="transform" type="translate" from="-450 0" to="1350 0" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Işık tarama beyaz -->
  <rect x="-900" y="55" width="1800" height="80" fill="url(#scanlightwhite)" mask="url(#textmask)">
    <animateTransform attributeName="transform" type="translate" from="-450 0" to="1350 0" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- İnce neon çizgi -->
  <line x1="100" y1="138" x2="800" y2="138" stroke="#CC1F1F" stroke-width="1" opacity="0.4" filter="url(#neon)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Alt başlık -->
  <text x="450" y="162" text-anchor="middle" font-family="'Orbitron', Arial, sans-serif" font-size="11" fill="#FF6666" letter-spacing="5" font-weight="400">
    ◈ SOFTWARE ENGINEER ◈ GAME DEVELOPER ◈ STUDIO FOUNDER ◈
  </text>
</svg>
