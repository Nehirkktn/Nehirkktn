<svg width="860" height="185" viewBox="0 0 860 185" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scangrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#CC1F1F"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="856" height="181" rx="4" fill="#0a0000" stroke="#CC1F1F" stroke-width="1" opacity="0.9"/>
  <rect x="2" y="2" width="3" height="181" rx="2" fill="#CC1F1F" filter="url(#cardglow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="2" y="2" width="856" height="1.5" rx="1" fill="url(#scangrad2)">
    <animate attributeName="y" values="2;181;2" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="25" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Oyun geliştirme süreçlerine yeni bir soluk getirmek ve kendi standartlarımızı yaratmak için</text>
  <text x="30" y="42" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">kurucularından biri olduğum DuckingCore'u kurduk.</text>

  <text x="30" y="66" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Biz her sorunun cevabına önceden sahip olduğumuzu söylemiyoruz. Bizim asıl gücümüz, bilmediğimiz</text>
  <text x="30" y="83" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">şeylerle karşılaştığımızda onları yolda, doğrudan üretimin içindeyken çözme ve öğrenme refleksimiz.</text>

  <text x="30" y="107" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Teknik disipline, mühendislik kalitesine ve oyuncuya hissettirilen o saf deneyime odaklanan, kararlarını</text>
  <text x="30" y="124" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">bağımsızca alan bir ekibiz. Şişirilmiş vaatlerin arkasına saklanmıyor, potansiyelimize ve problem çözme</text>
  <text x="30" y="141" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">yeteneğimize güveniyoruz. Başkalarının belirlediği sınırların içinde kalmak yerine, kendi yolumuzu kendimiz inşa ediyoruz.</text>

  <line x1="30" y1="152" x2="830" y2="152" stroke="#CC1F1F" stroke-width="0.5" opacity="0.3"/>

  <text x="30" y="171" font-family="Arial Black, sans-serif" font-size="13" fill="#CC1F1F" font-weight="900">2026</text>
  <text x="90" y="171" font-family="Arial, sans-serif" font-size="9" fill="#666666" letter-spacing="2">KURULUŞ</text>

  <text x="240" y="171" font-family="Arial Black, sans-serif" font-size="13" fill="#CC1F1F" font-weight="900">10</text>
  <text x="262" y="171" font-family="Arial, sans-serif" font-size="9" fill="#666666" letter-spacing="2">KİŞİLİK EKİP</text>

  <text x="440" y="171" font-family="Arial Black, sans-serif" font-size="13" fill="#CC1F1F" font-weight="900">100%</text>
  <text x="494" y="171" font-family="Arial, sans-serif" font-size="9" fill="#666666" letter-spacing="2">BAĞIMSIZ</text>

  <text x="660" y="171" font-family="Arial Black, sans-serif" font-size="13" fill="#CC1F1F" font-weight="900">∞</text>
  <text x="678" y="171" font-family="Arial, sans-serif" font-size="9" fill="#666666" letter-spacing="2">MOTİVASYON</text>
</svg>
