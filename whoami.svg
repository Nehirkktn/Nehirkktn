<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Kart arka planı -->
  <rect x="2" y="2" width="856" height="196" rx="4" fill="#0a0000" stroke="#CC1F1F" stroke-width="1" opacity="0.9"/>

  <!-- Sol kırmızı çizgi -->
  <rect x="2" y="2" width="3" height="196" rx="2" fill="#CC1F1F" filter="url(#cardglow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Üst scan line animasyonu -->
  <rect x="2" y="2" width="856" height="2" rx="1" fill="none"/>
  <rect x="2" y="2" width="856" height="1.5" rx="1" fill="url(#scangrad)">
    <animate attributeName="y" values="2;196;2" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <defs>
    <linearGradient id="scangrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#CC1F1F"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- İçerik -->
  <text x="36" y="52" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="13" fill="#CC1F1F" letter-spacing="3" font-weight="700">I DON'T WAIT.</text>
  <text x="36" y="75" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="13" fill="#CC1F1F" letter-spacing="3" font-weight="700">I BUILD.</text>

  <text x="36" y="112" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" letter-spacing="0.5">We didn't start knowing everything. But the unknown never stopped us.</text>
  <text x="36" y="132" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa" letter-spacing="0.5">While everyone says "in time" — we wrote our own game plan.</text>

  <text x="36" y="165" font-family="Arial, sans-serif" font-size="12" fill="#888888" letter-spacing="0.5">First year of university. Founded a studio. Built a 10-person team from zero.</text>
  <text x="36" y="183" font-family="Arial, sans-serif" font-size="12" fill="#888888" letter-spacing="0.5">Led multiple teams. Shipped real projects. The game has just begun.</text>
</svg>
