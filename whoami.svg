<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scangrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#CC1F1F"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="856" height="216" rx="4" fill="#0a0000" stroke="#CC1F1F" stroke-width="1" opacity="0.9"/>
  <rect x="2" y="2" width="3" height="216" rx="2" fill="#CC1F1F" filter="url(#cardglow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="2" y="2" width="856" height="1.5" rx="1" fill="url(#scangrad)">
    <animate attributeName="y" values="2;216;2" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="30" y="38" font-family="Arial Black, sans-serif" font-size="14" fill="#CC1F1F" font-weight="900" letter-spacing="0.5">Doğru anı beklemiyorum. Kendim yaratıyorum.</text>

  <line x1="30" y1="50" x2="830" y2="50" stroke="#CC1F1F" stroke-width="0.5" opacity="0.3"/>

  <text x="30" y="74" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Üniversitenin ilk yılında bir indie oyun stüdyosunun kurucularından biri oldum — ekibi sıfırdan</text>
  <text x="30" y="91" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">kurdum ve tüm süreci başından itibaren üstlendim. Çoğu insan kendini hazır hissedene kadar bekler.</text>
  <text x="30" y="108" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Ben hiç öyle düşünmedim.</text>

  <text x="30" y="133" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Ne yaparsam en iyisini yapmak için uğraşırım. Baskı altında soğukkanlılığımı korur, dikkatlice</text>
  <text x="30" y="150" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">planlar ve başladığım şeyi sonuna kadar götürürüm. Cesur kararlar beni korkutmaz — hesapsız</text>
  <text x="30" y="167" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">olanlar korkutur. İşte fark bu.</text>

  <text x="30" y="192" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Hızlı öğrenir, daha hızlı adapte olurum. Bilinmeyene adım atmaktan çekinmem.</text>
  <text x="30" y="209" font-family="Arial, sans-serif" font-size="12" fill="#aaaaaa">Çünkü gerçek ilerleme orada başlar.</text>
</svg>
